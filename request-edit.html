<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRS — Edit Request</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <div
          class="d-flex justify-content-between pb-4 mb-4 border-bottom border-2"
        >
          <h2>Edit Request</h2>
        </div>

        <form
          class="d-flex flex-column"
          novalidate
          data-success="/Requests.html"
        >
          <div class="d-flex flex-row gap-4">
            <div class="d-flex flex-column w-50">
              <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <input
                  id="description"
                  class="form-control"
                  type="text"
                  placeholder="Enter a brief description for your purchase"
                  required
                />
                <div class="invalid-feedback">Description is required</div>
              </div>
              <div class="mb-3">
                <label for="justification" class="form-label"
                  >Justification</label
                >
                <input
                  id="justification"
                  class="form-control"
                  type="text"
                  placeholder="Enter a justification for your purchase request"
                  required
                />
                <div class="invalid-feedback">Justification is required</div>
              </div>
            </div>

            <div class="d-flex flex-column w-25">
              <div class="mb-3">
                <label for="deliveryMethod" class="form-label"
                  >Delivery Method</label
                >
                <select name="" id="deliveryMethod" class="form-select" required>
                  <option value="">Select...</option>
                  <option value="DELIVERY">Delivery</option>
                  <option value="PICKUP">Pickup</option>
                  <option value="SIGNATUREDELIVERY">Signature Delivery</option>
                </select>
                <div class="invalid-feedback">Delivery method is required</div>
              </div>
              <div class="mb-3">
                <label for="status" class="form-label">Status</label>
                <select name="" id="status" class="form-select" required>
                  <option value="">Select...</option>
                  <option value="NEW">New</option>
                  <option value="REVIEW">Review</option>
                  <option value="APPROVED" selected>Approved</option>
                  <option value="REJECTED">Rejected</option>
                </select>
                <div class="invalid-feedback">Status is required</div>
              </div>
              <div class="mb-3">
                <label for="staff" class="form-label">Requested By</label>
                <select name="" id="staff" class="form-select" disabled>
                  <option value="">Russel Kassulke</option>
                </select>
              </div>
            </div>
          </div>
          <div class="row-3 d-flex flex-row justify-content-end w-75 ms-4">
            <div class="d-flex justify-content-end mt-4">
              <a href="/Requests.html" class="btn btn-outline-primary me-2"
                >Cancel</a
              >
              <button type="submit" class="btn btn-primary">
                <svg
                  class="bi pe-none me-2"
                  width="16"
                  height="16"
                  fill="#FFFFFF"
                >
                  <use href="/assets/bootstrap-icons.svg#save" />
                </svg>
                Save item
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/validation.js"></script>
  </body>
</html>

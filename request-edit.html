<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRS — Edit Request</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <div
          class="d-flex justify-content-between pb-4 mb-4 border-bottom border-2"
        >
          <h2>Edit Request</h2>
        </div>

        <form class="d-flex flex-column me-">
          <div class="d-flex flex-row gap-4">
            <div class="d-flex flex-column w-50">
              <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <input
                  id="description"
                  class="form-control"
                  type="text"
                  placeholder="Enter a brief description for your purchase"
                />
              </div>
              <div class="mb-3">
                <label for="justification" class="form-label"
                  >Justification</label
                >
                <input
                  id="justification"
                  class="form-control"
                  type="text"
                  placeholder="Enter a justification for your purchase request"
                />
              </div>
            </div>

            <div class="d-flex flex-column w-25">
              <div class="mb-3">
                <label for="deliveryMethod" class="form-label"
                  >Delivery Method</label
                >
                <select name="" id="deliveryMethod" class="form-select">
                  <option value="">Select...</option>
                  <option value="DELIVERY">Delivery</option>
                  <option value="PICKUP">Pickup</option>
                  <option value="SIGNATUREDELIVERY">Signature Delivery</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="status" class="form-label">Status</label>
                <select name="" id="status" class="form-select">
                  <option value="NEW">New</option>
                  <option value="REVIEW">Review</option>
                  <option value="APPROVED" selected>Approved</option>
                  <option value="REJECTED">Rejected</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="staff" class="form-label">Requested By</label>
                <select name="" id="staff" class="form-select" disabled>
                  <option value="">Russel Kassulke</option>
                </select>
              </div>
            </div>
          </div>
          <div class="row-3 d-flex flex-row justify-content-end w-100 gap-4">
            <div class="d-flex justify-content-end mt-4">
              <a href="/Requests.html" class="btn btn-outline-primary me-2"
                >Cancel</a
              >
              <button type="submit" class="btn btn-primary">
                <svg
                  class="bi pe-none me-2"
                  width="16"
                  height="16"
                  fill="#FFFFFF"
                >
                  <use href="/assets/bootstrap-icons.svg#save" />
                </svg>
                Save item
              </button>
            </div>
          </div>
        </form>
        <div class="card p-4 mt-5">
          <h5 class="card-title">Items</h5>
          <table class="table w-75">
            <thead>
              <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Amount</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <!-- items start here -->
              <tr>
                <td>Refined Ceramic Towels</td>
                <td>$85.29</td>
                <td>1</td>
                <td>$85.29</td>
                <td>
                  <a href="/Requestline-edit.html" class="btn btn-outline">
                    <svg
                      class="bi pe-none me-2"
                      width="16"
                      height="16"
                      fill="#007AFF"
                    >
                      <use href="/assets/bootstrap-icons.svg#pencil" />
                    </svg>
                  </a>
                  <button
                    type="button"
                    class="btn btn-outline"
                    data-bs-toggle="modal"
                    data-bs-target="#deleteRequestItemModal"
                  >
                    <svg
                      class="bi pe-none me-2"
                      width="16"
                      height="16"
                      fill="#007AFF"
                    >
                      <use href="/assets/bootstrap-icons.svg#trash" />
                    </svg>
                  </button>
                </td>
              </tr>
              <!-- more item rows -->
              <tr>
                <td>Fantastic Ceramic Hats</td>
                <td>$68.30</td>
                <td>3</td>
                <td>$204.90</td>
                <td>
                  <a href="/Requestline-edit.html" class="btn btn-outline">
                    <svg
                      class="bi pe-none me-2"
                      width="16"
                      height="16"
                      fill="#007AFF"
                    >
                      <use href="/assets/bootstrap-icons.svg#pencil" />
                    </svg>
                  </a>
                  <button
                    type="button"
                    class="btn btn-outline"
                    data-bs-toggle="modal"
                    data-bs-target="#deleteRequestItemModal"
                  >
                    <svg
                      class="bi pe-none me-2"
                      width="16"
                      height="16"
                      fill="#007AFF"
                    >
                      <use href="/assets/bootstrap-icons.svg#trash" />
                    </svg>
                  </button>
                </td>
              </tr>
            </tbody>
            <tfoot>
              <tr>
                <td>
                  <a
                    href="/Requestitem-create.html"
                    class="btn btn-outline-primary"
                  >
                    <svg
                      class="bi pe-none me-2"
                      width="16"
                      height="16"
                      fill="#007AFF"
                    >
                      <use href="/assets/bootstrap-icons.svg#plus-circle" />
                    </svg>
                    Add a line
                  </a>
                </td>
                <td>$290.19</td>
                <td></td>
                <td></td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

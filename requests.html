<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRS — Requests</title>
    <link rel="stylesheet" href="/node_modules/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
          <div
          class="d-flex justify-content-between pb-4 mb-4 brequest-bottom brequest-2"
        >
          <h2>Requests</h2>
          <a href="/request-create.html" class="btn btn-primary">
            <svg class="bi pe-none me-2" width="32" height="32" fill="#FFFFFF">
              <use href="/assets/bootstrap-icons.svg#plus" />
            </svg>
            Create a request
          </a>
        </div>
        <div class="d-flex flex-column mb-4" style="width: 250px">
          <label for="status" class="form-label">Status</label>
          <select id="status" class="form-select">
            <option value="">All</option>
            <option value="NEW">New</option>
            <option value="REVIEW">Review</option>
            <option value="APPROVED">Approved</option>
            <option value="REJECTED">Rejected</option>
          </select>
        </div>
        <section
          class="list d-flex flex-row flex-wrap bg-body-tertiary gap-5 p-4 rounded-4"
        >
          <table class="table table-hover w-100 rounded-4">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">Description</th>
                <th scope="col">Status</th>
                <th scope="col">Total</th>
                <th scope="col">Requested By</th>
                <th></th>
              </tr>

            </thead>
            <!-- this is where the table starts -->
            <tbody>
              <tr>
                <th scope="row">1</th>
                <td><div>Office Supplies </div> <div class="fs-6 fw-light">Need to reup</div> </td>
                <td><span class="badge text-bg-success">Approved</span></td>
                <td>$290.19</td>
                <td><div>Russel Kassulke</div><div class="fs-6 fw-light">Pickup</div></td>
                <td>
                  <div class="dropdown d-inline">
                    <button
                      class="btn btn-light"
                      style="background: none"
                      type="button"
                      data-bs-toggle="dropdown"
                      aria-expanded="false"
                    >
                      <svg
                        class="bi pe-none me-2"
                        width="20"
                        height="20"
                        fill="#007AFF"
                      >
                        <use
                          href="/assets/bootstrap-icons.svg#three-dots-vertical"
                        />
                      </svg>
                    </button>
                    <ul class="dropdown-menu">
                      <li>
                        <a class="dropdown-item" href="/request-detail.html"
                          >View</a
                        >
                      </li>
                      <li>
                        <a class="dropdown-item" href="/request-edit.html"
                          >Edit</a
                        >
                      </li>
                      <li>
                        <a
                          class="dropdown-item"
                          href="#"
                          data-bs-toggle="modal"
                          data-bs-target="#deleterequestModal"
                          >Delete</a
                        >
                      </li>
                    </ul>
                  </div>
                </td>
              </tr>
              <!-- more <tr> rows, one per request -->
            </tbody>
          </table>
          <div
            class="modal fade"
            id="deleterequestModal"
            tabindex="-1"
            aria-hidden="true"
          >
            <div class="modal-dialog">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title">Delete request</h5>
                  <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                    aria-label="Close"
                  ></button>
                </div>
                <div class="modal-body">
                  <p>Are you sure you want to delete this request ?</p>
                </div>
                <div class="modal-footer">
                  <button
                    type="button"
                    class="btn btn-outline-primary"
                    data-bs-dismiss="modal"
                  >
                    Cancel
                  </button>
                  <button
                    type="button"
                    class="btn btn-danger"
                    data-bs-dismiss="modal"
                  >
                    Delete
                  </button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

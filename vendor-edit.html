<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRS — Edit Vendor</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <div
          class="d-flex justify-content-between pb-4 mb-4 border-bottom border-2"
        >
          <h2>Edit Vendor</h2>
        </div>

        <form
          class="d-flex flex-column w-75"
          novalidate
          data-success="vendors.html"
        >
          <div class="d-flex flex-row gap-4">
            <div class="mb-3 w-50">
              <label for="vendorcode" class="form-label">Vendor code</label>
              <input
                id="vendorcode"
                class="form-control"
                type="text"
                placeholder="Enter short vendor code"
                required
                value="MCKE-NZ"
              />
              <div class="invalid-feedback">Vendor code is requiered</div>
            </div>

            <div class="mb-3 w-50">
              <label for="vendorname" class="form-label">Vendor name</label>
              <input
                type="text"
                class="form-control"
                name=""
                id="vendorname"
                placeholder="Enter vendor name"
                required
                value="McKenzie Group"
              />
              <div class="invalid-feedback">Vendor name is requiered</div>
            </div>
          </div>
          <div class="d-flex flex-row gap-4">
            <div class="mb-3 w-100">
              <label for="adddress" class="form-label">Address</label>
              <input
                type="text"
                id="address"
                class="form-control"
                placeholder="Enter vendor's address"
                required
                value="7319 Aubree Bridge"
              />
              <div class="invalid-feedback">Address is requiered</div>
            </div>
          </div>

          <div class="d-flex flex-row gap-4">
            <div class="mb-3 w-50">
              <label for="city" class="form-label">City</label>
              <input
                id="city"
                class="form-control"
                type="text"
                placeholder="Enter city"
                required
                value="Wuckertside"
              />
              <div class="invalid-feedback">City is requiered</div>
            </div>

            <div class="mb-3 w-25">
              <label for="state" class="form-label">State</label>
              <select name="" id="state" class="form-select" required>
                <option value="">Select state...</option>
                <option value="AL">Alabama</option>
                <option value="AK">Alaska</option>
                <option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="CT">Connecticut</option>
                <option value="DE">Delaware</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>
                <option value="HI">Hawaii</option>
                <option value="ID">Idaho</option>
                <option value="IL">Illinois</option>
                <option value="IN">Indiana</option>
                <option value="IA">Iowa</option>
                <option value="KS">Kansas</option>
                <option value="KY">Kentucky</option>
                <option value="LA" selected>Louisiana</option>
                <option value="ME">Maine</option>
                <option value="MD">Maryland</option>
                <option value="MA">Massachusetts</option>
                <option value="MI">Michigan</option>
                <option value="MN">Minnesota</option>
                <option value="MS">Mississippi</option>
                <option value="MO">Missouri</option>
                <option value="MT">Montana</option>
                <option value="NE">Nebraska</option>
                <option value="NV">Nevada</option>
                <option value="NH">New Hampshire</option>
                <option value="NJ">New Jersey</option>
                <option value="NM">New Mexico</option>
                <option value="NY">New York</option>
                <option value="NC">North Carolina</option>
                <option value="ND">North Dakota</option>
                <option value="OH">Ohio</option>
                <option value="OK">Oklahoma</option>
                <option value="OR">Oregon</option>
                <option value="PA">Pennsylvania</option>
                <option value="RI">Rhode Island</option>
                <option value="SC">South Carolina</option>
                <option value="SD">South Dakota</option>
                <option value="TN">Tennessee</option>
                <option value="TX">Texas</option>
                <option value="UT">Utah</option>
                <option value="VT">Vermont</option>
                <option value="VA">Virginia</option>
                <option value="WA">Washington</option>
                <option value="WV">West Virginia</option>
                <option value="WI">Wisconsin</option>
                <option value="WY">Wyoming</option>
              </select>
              <div class="invalid-feedback">State is requiered</div>
            </div>
            <div class="mb-3 w-25">
              <label for="zip" class="form-label">Zip</label>
              <input
                id="zip"
                class="form-control"
                type="number"
                placeholder="Enter zip code"
                required
                value="22245"
              />
              <div class="invalid-feedback">Zip is requiered</div>
            </div>
          </div>
          <div class="d-flex flex-row gap-4">
            <div class="mb-3 w-50">
              <label for="phone" class="form-label">Phone</label>
              <input
                id="phone"
                class="form-control"
                type="phone"
                placeholder="Enter phone number"
                value="9408595147"
              />
              <div class="invalid-feedback">Phone number is requiered</div>
            </div>

            <div class="mb-3 w-50">
              <label for="email" class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                name=""
                id="email"
                placeholder="Enter email address"
                value="support@MCKE-nz.com"
              />
              <div class="invalid-feedback">Email is requiered</div>
            </div>
          </div>
          <div class="row-3 d-flex flex-row justify-content-end gap-4">
            <div class="d-flex justify-content-end mt-4">
              <a href="/products.html" class="btn btn-outline-primary me-2"
                >Cancel</a
              >
              <button type="submit" class="btn btn-primary">
                <svg
                  class="bi pe-none me-2"
                  width="16"
                  height="16"
                  fill="#FFFFFF"
                >
                  <use href="/assets/bootstrap-icons.svg#save" />
                </svg>
                Save product
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/validation.js"></script>
  </body>
</html>

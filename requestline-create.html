<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRS — New Request Line</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <div
          class="d-flex justify-content-between pb-4 mb-4 border-bottom border-2"
        >
          <h2>New Request Line</h2>
        </div>
        <form
          class="form w-50"
          novalidate
          data-success="/Requests.html"
        >
          <div class="card p-4">
            <h5 class="card-title"><strong>Item</strong></h5>

            <div class="mb-3">
              <label for="productItemId" class="form-label">Product</label>
              <select id="productItemId" class="form-select" required>
                <option value="">Select...</option>
                <option value="0">Refined Ceramic Towels</option>
                <option value="1">Chair</option>
                <option value="2">Mozzarella Sticks</option>
                <!-- ...all items -->
              </select>
              <div class="invalid-feedback">Product is required</div>
            </div>

            <div class="mb-3">
              <label for="price" class="form-label">Price</label>
              <div class="form-label">$0.00</div>
            </div>

            <div class="mb-3">
              <label for="quantity" class="form-label">Quantity</label>
              <input
                id="quantity"
                type="number"
                class="form-control"
                value="1"
                min="1"
              />
              <div class="invalid-feedback">Quantity cannot be zero</div>
            </div>

            <div class="mb-3">
              <label for="amount" class="form-label">Amount</label>
              <div class="form-label">$0.00</div>
            </div>

            <div class="d-flex justify-content-end mt-4">
              <a
                href="/request-detail.html"
                class="btn btn-outline-primary me-2"
                >Cancel</a
              >
              <button type="submit" class="btn btn-primary">
                <svg
                  class="bi pe-none me-2"
                  width="16"
                  height="16"
                  fill="#FFFFFF"
                >
                  <use href="/assets/bootstrap-icons.svg#save" />
                </svg>
                Save item
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/validation.js"></script>
  </body>
</html>

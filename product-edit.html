<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRS — Edit Product</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <div
          class="d-flex justify-content-between pb-4 mb-4 border-bottom border-2"
        >
          <h2>Edit Product</h2>
        </div>

        <form
          class="d-flex flex-column w-75"
          novalidate
          data-success="/request-detail.html"
        >
          <div class="d-flex flex-row gap-4 pe-4">
            <div class="mb-3 w-25">
              <label for="productNumber" class="form-label"
                >Product Number</label
              >
              <input
                id="productNumber"
                class="form-control"
                type="text"
                placeholder="Enter product number"
                value="978-0-13-947664-8"
                required
              />
              <div class="invalid-feedback">Product number is requiered</div>
            </div>

            <div class="mb-3 w-50">
              <label for="productName" class="form-label">Product Name</label>
              <input
                type="text"
                class="form-control"
                name=""
                id="productName"
                placeholder="Enter product name"
                value="Soft Granite Cheese"
                required
              />
              <div class="invalid-feedback">Product name is requiered</div>
            </div>
          </div>
          <div class="d-flex flex-row gap-4 w-75">
            <div class="mb-3 w-25">
              <label for="price" class="form-label">Price</label>
              <input
                id="price"
                class="form-control"
                type="number"
                placeholder="Enter product's price"
                value="86.09"
                required
              />
              <div class="invalid-feedback">Price is requiered</div>
            </div>
            <div class="mb-3 w-25">
              <label for="unit" class="form-label">Unit</label>
              <input
                id="unit"
                class="form-control"
                type="text"
                placeholder="Enter unit"
                value="Box"
                required
              />
              <div class="invalid-feedback">Unit is requiered</div>
            </div>
            <div class="mb-3 w-50">
              <label for="vendor" class="form-label">Vendor</label>
              <select name="" id="vendor" class="form-select" required>
                <option value="">Select Vendor...</option>
                <option value="1" selected>Roob LLC</option>
              </select>
              <div class="invalid-feedback">Vendor is requiered</div>
            </div>
          </div>
          <div class="row-3 d-flex flex-row justify-content-end w-75 gap-4">
            <div class="d-flex justify-content-end mt-4">
              <a href="/products.html" class="btn btn-outline-primary me-2"
                >Cancel</a
              >
              <button type="submit" class="btn btn-primary">
                <svg
                  class="bi pe-none me-2"
                  width="16"
                  height="16"
                  fill="#FFFFFF"
                >
                  <use href="/assets/bootstrap-icons.svg#save" />
                </svg>
                Save product
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/validation.js"></script>
  </body>
</html>
